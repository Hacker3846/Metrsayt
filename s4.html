<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calc v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass-card">
    <h2 id="title">Расчет площади</h2>
    <div class="input-group"><label>Цена</label><input type="number" id="p" oninput="c()" placeholder="0.00"></div>
    <div class="input-group"><label>Длина</label><input type="number" id="l" oninput="c()"></div>
    <div class="input-group"><label>Ширина</label><input type="number" id="w" oninput="c()"></div>
    <div class="input-group"><label>Высота</label><input type="number" id="h" oninput="c()" placeholder="—"></div>
    
    <div class="result-container">
        <div class="result-item"><span class="small" id="lbl">Итоговая площадь:</span><span class="val" id="rf">0</span></div>
        <div class="result-item"><span class="small">Итоговая стоимость:</span><span class="val total" id="rm">0 руб.</span></div>
    </div>
</div>

<script src='script.js'></script>
</body>
</html>
