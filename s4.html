<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calc v2.0</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            /* Цвет мокрого асфальта + картинка. Попробуйте эту прямую ссылку из Википедии для теста (она всегда работает) */
            background: #2c2c2c no-repeat center center fixed;
            background-size: cover;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            padding: 25px;
            width: 320px;
            color: #fff;
        }
        h2 { margin: 0 0 20px; text-align: center; font-size: 1.4rem; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; opacity: 0.8; }
        input {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            color: #fff; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: #00e676; background: rgba(255,255,255,0.2); }
        .result-container { margin-top: 20px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .result-item { padding: 12px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .result-item:last-child { border: none; background: linear-gradient(135deg, rgba(0,230,118,0.2), rgba(0,188,212,0.2)); }
        .val { font-size: 1.3rem; font-weight: 700; display: block; }
        .total { color: #00e676; }
        .small { font-size: 0.65rem; opacity: 0.6; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2 id="title">Расчет площади</h2>
    <div class="input-group"><label>Цена</label><input type="number" id="p" oninput="c()" placeholder="0.00"></div>
    <div class="input-group"><label>Длина</label><input type="number" id="l" oninput="c()"></div>
    <div class="input-group"><label>Ширина</label><input type="number" id="w" oninput="c()"></div>
    <div class="input-group"><label>Высота</label><input type="number" id="h" oninput="c()" placeholder="—"></div>
    
    <div class="result-container">
        <div class="result-item"><span class="small" id="lbl">Итоговая площадь:</span><span class="val" id="rf">0</span></div>
        <div class="result-item"><span class="small">Итоговая стоимость:</span><span class="val total" id="rm">0 руб.</span></div>
    </div>
</div>

<script>
    function c() {
        const g = id => document.getElementById(id), v = id => g(id).value;
        const p = +v('p')||0, l = +v('l')||0, w = +v('w')||0, hStr = v('h').trim();
        const isV = hStr !== "" && !isNaN(+hStr), res = isV ? l * w * (+hStr) : l * w;
        g('title').innerText = isV ? "Расчет объема" : "Расчет площади";
        g('lbl').innerText = isV ? "Итоговый объем:" : "Итоговая площадь:";
        g('rf').innerText = +res.toFixed(4);
        g('rm').innerText = (res * p).toLocaleString('ru-RU') + " руб.";
    }
</script>
</body>
</html>
