<div class="container">
    <h1>Транслитератор (Караоке JSON)</h1>
    <div class="grid">
        <div>
            <label>Арабский текст (с огласовками)</label>

        <button onclick="processText()">Сгенерировать JSON</button>

<script>
const charMap = {
    'ء': { b: 'Ъ', t: 'soft' }, 'أ': { b: 'Ъ', t: 'soft' }, 'إ': { b: 'Ъ', t: 'soft' }, 
    'ؤ': { b: 'Ъ', t: 'soft' }, 'ئ': { b: 'Ъ', t: 'soft' },
    'آ': { b: 'Ъ', t: 'soft', madd: true, longMadd: true },
    'ا': { b: '', t: 'soft' }, 'ٱ': { b: '', t: 'soft' },
    'ب': { b: 'Б', t: 'soft' }, 'ت': { b: 'Т', t: 'soft' }, 
    'ث': { b: 'С', s: 'Ъ', t: 'soft' }, 'ج': { b: 'ДЖ', t: 'soft' }, 
    'ح': { b: 'Х', s: 'Ь', t: 'soft' }, 'خ': { b: 'Х', t: 'hard' },
    'د': { b: 'Д', t: 'soft' }, 'ذ': { b: 'З', s: 'Ъ', t: 'soft' }, 
    'ر': { b: 'Р', t: 'r' },     'ز': { b: 'З', t: 'soft' }, 
    'س': { b: 'С', t: 'soft' }, 'ش': { b: 'Ш', t: 'soft' },
    'ص': { b: 'С', t: 'hard' }, 'ض': { b: 'Д', s: 'Ъ', t: 'hard' }, 
    'ط': { b: 'Т', s: 'I', t: 'hard' }, 'ظ': { b: 'З', s: 'Ъ', t: 'hard' }, 
    'ع': { b: 'I', t: 'soft' }, 'غ': { b: 'Г', s: 'I', t: 'hard' },
    'ف': { b: 'Ф', t: 'soft' }, 'ق': { b: 'К', s: 'Ъ', t: 'hard' }, 
    'ك': { b: 'К', t: 'soft' }, 'ل': { b: 'Л', t: 'soft' }, 
    'م': { b: 'М', t: 'soft' }, 'ن': { b: 'Н', t: 'soft' },
    'ه': { b: 'Х', s: 'I', t: 'soft' },'ة': { b: 'Т', t: 'soft' }, 
    'و': { b: 'В', t: 'w' },     'ي': { b: 'Й', t: 'soft' },
    'ى': { b: '', t: 'soft' },   'ی': { b: 'Й', t: 'soft' }, 
    'ؽ': { b: 'Й', t: 'soft', madd: true, longMadd: true }, 
    'ۏ': { b: 'В', t: 'w', madd: true, longMadd: true }     
};

const sunLetters = ['ت','ث','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ل','ن'];
const ikhfaLetters = ['ت','ث','ج','د','ذ','ز','س','ش','ص','ض','ط','ظ','ف','ق','ك'];
const idghamLetters = ['ي','ر','م','ل','و','ن', 'ی']; 
const hamzaLetters = ['ء', 'أ', 'إ', 'ؤ', 'ئ', 'آ'];

function getVowel(type, haraka, tanween, isMadd, longMadd) {
    let v = '';
    if (haraka === 'f') {
        if (type === 'hard' || type === 'r') v = 'О'; else v = 'А';
    } else if (haraka === 'k') {
        if (type === 'hard' || type === 'w') v = 'Ы'; else v = 'И';
    } else if (haraka === 'd') {
        v = 'У';
    } else if (tanween) {
        let baseVowel = '';
        if (tanween === 'f') baseVowel = (type === 'hard' || type === 'r') ? 'О' : 'А';
        if (tanween === 'k') baseVowel = (type === 'hard' || type === 'w') ? 'Ы' : 'И';
        if (tanween === 'd') baseVowel = 'У';
        return baseVowel + 'Н';
    }
    if (!v) return '';
    if (isMadd) return longMadd ? v + v + v : v + v;
    return v;
}

function attachToPrev(tokens, currentIndex, consonantStr) {
    let p = currentIndex - 1;
    while (p >= 0 && (tokens[p].isSpace || tokens[p].silent || tokens[p].char === 'ا' || tokens[p].char === 'ى' || tokens[p].char === '۟' || tokens[p].char === '۠')) p--;
    if (p >= 0) {
        tokens[p].madd = false;      
        tokens[p].longMadd = false;
        tokens[p].attachNextConsonant = consonantStr;
    }
}

function processText() {
    let rawText = document.getElementById('arabicInput').value;
    
    let cleanText = rawText.replace(/[٠-٩۝\.,:;]/g, '');
    let lines = cleanText.split('\n');
    
    let finalJSONArray = [];
    let globalIdCount = 1;
    let ayahCount = 0; 

    for (let line of lines) {
        if (line.trim().length === 0) continue; 
        
        let tokens = [];
        let current = null;

        for (let char of line) {
            if (char === ' ' || char === '\t') {
                if (current) { tokens.push(current); current = null; }
                tokens.push({ isSpace: true, rawChars: char });
                continue;
            }

            if (charMap[char]) {
                if (current) tokens.push(current);
                current = {
                    char: char, rawChars: char, 
                    base: charMap[char].b, spec: charMap[char].s || '', type: charMap[char].t,
                    haraka: (char === 'آ') ? 'f' : null, shadda: false, sukun: false, tanween: null, 
                    madd: charMap[char].madd || false, longMadd: charMap[char].longMadd || false, 
                    hasTilde: false, hasSpecialMadd: false, silent: false, isDaggerSeat: false
                };
            } else if (current) {
                current.rawChars += char; 
                if (char === 'َ') current.haraka = 'f';
                if (char === 'ِ') current.haraka = 'k';
                if (char === 'ُ') current.haraka = 'd';
                
                if (['ً', 'ࣰ', 'ﹱ'].includes(char)) current.tanween = 'f'; 
                if (['ٍ', 'ࣲ', 'ﹴ'].includes(char)) current.tanween = 'k';
                if (['ٌ', 'ࣱ', 'ٞ', 'ﹲ'].includes(char)) current.tanween = 'd';
                
                if (char === 'ْ' || char === 'ۡ') current.sukun = true;
                if (char === 'ّ') current.shadda = true;
                
                if (char === 'ٓ' || char === 'ۤ') { current.longMadd = true; current.hasTilde = true; }
                
                if (char === 'ٰ') { 
                    current.haraka = 'f'; current.madd = true; 
                    if (['ى', 'ي', 'ی', 'و', 'ا'].includes(current.char)) { current.base = ''; current.isDaggerSeat = true; }
                } 
                
                // ИСПРАВЛЕНИЕ: Гибкая обработка перевёрнутой даммы (ٗ). 
                // Если она стоит над 'ه', то это 'УУ' (как в لَهُۥ). 
                // Если над любой другой буквой (как в ضَبۡحٗا), это ошибка кодировки, и мы применяем правило танвина фатхи.
                if (char === 'ٗ') { 
                    if (current.char === 'ه') {
                        current.haraka = 'd'; current.madd = true; 
                    } else {
                        current.tanween = 'f';
                    }
                } 

                if (char === 'ٖ') { current.haraka = 'k'; current.madd = true; } 
                if (char === 'ۥ') { current.haraka = 'd'; current.madd = true; } 
                if (char === 'ۦ') { current.haraka = 'k'; current.madd = true; } 

                if (char === '۟' || char === '۠') current.silent = true; 
            }
        }
        if (current) tokens.push(current);

        for (let i = 0; i < tokens.length; i++) {
            let tok = tokens[i];
            if (tok.char === 'ا' && tok.tanween) {
                let p = i - 1;
                while (p >= 0 && (tokens[p].isSpace || tokens[p].silent)) p--;
                if (p >= 0) {
                    tokens[p].tanween = tok.tanween;
                    tok.tanween = null;
                    tok.silent = true;
                }
            }
        }

        for (let i = 0; i < tokens.length; i++) {
            let tok = tokens[i];
            if (tok.isSpace || tok.silent) continue;
            let p = i - 1;
            while (p >= 0 && (tokens[p].isSpace || tokens[p].silent)) p--;
            let prev = (p >= 0) ? tokens[p] : null;

            let maddType = null;
            let isMadd = !tok.haraka && !tok.sukun && !tok.shadda && !tok.tanween;

            if (tok.char === 'آ' || tok.isDaggerSeat) maddType = 'a';
            else if (isMadd) {
                if (tok.char === 'ا' || tok.char === 'ى') maddType = 'a';
                else if (tok.char === 'ي' || tok.char === 'ی' || tok.char === 'ؽ') maddType = 'i';
                else if (tok.char === 'و' || tok.char === 'ۏ') maddType = 'u';
            }

            if (maddType && prev && !tok.sukun && !tok.shadda && !tok.tanween) {
                if (!prev.haraka && !prev.sukun && !prev.shadda && !prev.tanween) {
                    if (maddType === 'a') prev.haraka = 'f';
                    if (maddType === 'i') prev.haraka = 'k';
                    if (maddType === 'u') prev.haraka = 'd';
                }

                if ((maddType === 'a' && prev.haraka === 'f') || (maddType === 'i' && prev.haraka === 'k') || (maddType === 'u' && prev.haraka === 'd')) {
                    prev.madd = true;
                    if (tok.longMadd) prev.longMadd = true;
                    if (tok.hasTilde) prev.hasTilde = true; 
                    if (tok.char === 'ؽ' || tok.char === 'ۏ') prev.hasSpecialMadd = true; 
                    tok.silent = true;
                } 
                // ИСПРАВЛЕНИЕ: Делаем Алиф после танвина фатхи невидимым, чтобы правило Мадд Ийвад (остановка на АА) сработало корректно
                else if (maddType === 'a' && prev.tanween === 'f') {
                    tok.silent = true;
                }
            }
        }

        for (let i = 0; i < tokens.length; i++) {
            let tok = tokens[i];
            if (tok.isSpace || tok.silent) continue;
            if (tok.madd || tok.longMadd) {
                let nextPronounced = null;
                for (let n = i + 1; n < tokens.length; n++) {
                    if (!tokens[n].isSpace && !tokens[n].silent) { nextPronounced = tokens[n].char; break; }
                }
                let isExplicitLong = tok.hasTilde || tok.hasSpecialMadd;
                if (isExplicitLong || (tok.longMadd && nextPronounced && hamzaLetters.includes(nextPronounced))) tok.longMadd = true;
                else tok.longMadd = false;
                tok.madd = true; 
            }
        }

        for (let i = 0; i < tokens.length; i++) {
            let tok = tokens[i];
            if (tok.madd) {
                let foundWasl = false;
                for (let n = i + 1; n < tokens.length; n++) {
                    let nTok = tokens[n];
                    if (nTok.isSpace || (nTok.silent && ['ا','ى','ي','ی','و','ۏ','ؽ','۟','۠'].includes(nTok.char))) {
                        continue;
                    }
                    if (nTok.char === 'ٱ') {
                        foundWasl = true;
                    }
                    break;
                }
                if (foundWasl) {
                    tok.madd = false;
                    tok.longMadd = false;
                }
            }
        }

        for (let i = 0; i < tokens.length; i++) {
            if ((tokens[i].char === 'ا' || tokens[i].char === 'ٱ') && i > 0 && tokens[i-1].char === 'و') {
                if (i === tokens.length - 1 || tokens[i+1].isSpace || tokens[i].sukun || tokens[i].silent) tokens[i].silent = true;
            }
        }

        for (let i = 0; i < tokens.length; i++) {
            let tok = tokens[i];
            if (tok.isSpace || tok.silent) continue;

            if (tok.char === 'ا' || tok.char === 'ٱ') {
                let nextIdx = i + 1;
                if (nextIdx < tokens.length && tokens[nextIdx].char === 'ل') {
                    let lamTok = tokens[nextIdx];
                    let afterLamIdx = nextIdx + 1;
                    let afterLamTok = afterLamIdx < tokens.length ? tokens[afterLamIdx] : null;

                    let precededBySpeech = false;
                    for (let p = i - 1; p >= 0; p--) { if (!tokens[p].isSpace) { precededBySpeech = true; break; } }

                    if (precededBySpeech) tok.silent = true; else tok.forcedA = true;

                    if (afterLamTok && !afterLamTok.isSpace) {
                        let isSun = sunLetters.includes(afterLamTok.char);
                        if (isSun && !lamTok.shadda) {
                            lamTok.silent = true; afterLamTok.shadda = true;
                            if (precededBySpeech) { attachToPrev(tokens, i, afterLamTok.base + (afterLamTok.spec || '')); afterLamTok.hideFirstOfShadda = true; }
                        } else {
                            if (precededBySpeech) {
                                let lamS = (lamTok.sukun || lamTok.shadda) ? 'Ь' : '';
                                attachToPrev(tokens, i, lamTok.base + lamS);
                                if (!lamTok.shadda) lamTok.silent = true; else lamTok.hideFirstOfShadda = true;
                            }
                        }
                    }
                } else {
                    let precededBySpeech = false;
                    for (let p = i - 1; p >= 0; p--) { if (!tokens[p].isSpace) { precededBySpeech = true; break; } }
                    if (precededBySpeech && tok.char === 'ٱ') tok.silent = true;
                }
            }
        }

        for (let i = 0; i < tokens.length; i++) {
            let tok = tokens[i];
            if (tok.isSpace || tok.silent) continue;

            let hasSukunNun = (tok.char === 'ن' && !tok.haraka && !tok.tanween && !tok.shadda);
            let hasTanween = tok.tanween !== null;

            if (hasSukunNun || hasTanween) {
                let nextTok = null;
                for (let n = i + 1; n < tokens.length; n++) {
                    if (!tokens[n].isSpace && !tokens[n].silent) { nextTok = tokens[n]; break; }
                }

                if (nextTok) {
                    if (idghamLetters.includes(nextTok.char)) {
                        let r = '';
                        if (nextTok.char === 'ل' || nextTok.char === 'ر') {
                        } else {
                            nextTok.hideFirstOfShadda = true;
                            if (nextTok.char === 'و') r = '*У';
                            else if (nextTok.char === 'ي' || nextTok.char === 'ی') r = '*Й';
                            else if (nextTok.char === 'م') r = '*М';
                            else if (nextTok.char === 'ن') r = '*Н';
                        }
                        
                        if (hasSukunNun) tok.overrideRender = r;
                        if (hasTanween) tok.tanweenOverride = r;
                    } else if (nextTok.char === 'ب') {
                        if (hasSukunNun) tok.overrideRender = '*М';
                        if (hasTanween) tok.tanweenOverride = '*М';
                    } else if (ikhfaLetters.includes(nextTok.char)) {
                        if (hasSukunNun) tok.overrideRender = '*НН';
                        if (hasTanween) tok.tanweenOverride = '*НН';
                    }
                }
            }
        }

        let lineWords = [];
        let currentWordAr = "";
        let currentWordCy = "";

        for (let t = 0; t < tokens.length; t++) {
            let tok = tokens[t];

            if (tok.isSpace) {
                if (currentWordAr.trim() || currentWordCy.trim()) {
                    lineWords.push({ ar: currentWordAr.trim(), cy: currentWordCy.toUpperCase() });
                    currentWordAr = "";
                    currentWordCy = "";
                }
                continue;
            }

            if (tok.rawChars) currentWordAr += tok.rawChars;

            if (tok.silent) { 
                if (tok.attachNextConsonant) currentWordCy += tok.attachNextConsonant; 
                continue; 
            }

            if (tok.overrideRender !== undefined) { 
                currentWordCy += tok.overrideRender; 
                if (tok.attachNextConsonant) currentWordCy += tok.attachNextConsonant; 
                continue; 
            }

            let b = tok.base; let s = tok.spec || '';
            
            if (tok.char === 'ل') {
                s = (tok.sukun || tok.hideFirstOfShadda || tok.shadda || tok.attachNextConsonant || tok.haraka === 'd' || tok.tanween === 'd') ? 'Ь' : ''; 
            }

            if ((hamzaLetters.includes(tok.char)) && !tok.forcedA) {
                let isFirstPronounced = true;
                for (let j = t - 1; j >= 0; j--) {
                    if (tokens[j].isSpace) break;
                    let checkTok = tokens[j];
                    if (checkTok.char === 'ٱ' || checkTok.char === 'ا' || checkTok.char === 'ل') continue;
                    if (!checkTok.silent) { isFirstPronounced = false; break; }
                }
                b = isFirstPronounced ? '' : 'Ъ';
            }
            if (tok.forcedA) { b = ''; s = ''; tok.haraka = 'f'; }

            let cons = b + s;
            if (tok.shadda && !tok.hideFirstOfShadda) cons = b + b + s;

            let v = getVowel(tok.type, tok.haraka, tok.tanween, tok.madd, tok.longMadd);
            if (tok.tanweenOverride !== undefined) {
                let baseVowel = '';
                if (tok.tanween === 'f') baseVowel = (tok.type === 'hard' || tok.type === 'r') ? 'О' : 'А';
                if (tok.tanween === 'k') baseVowel = (tok.type === 'hard' || tok.type === 'w') ? 'Ы' : 'И';
                if (tok.tanween === 'd') baseVowel = 'У';
                v = baseVowel + tok.tanweenOverride;
            }

            let isLastRealToken = true;
            for (let j = t + 1; j < tokens.length; j++) { if (!tokens[j].isSpace && !tokens[j].silent) { isLastRealToken = false; break; } }

            if (isLastRealToken) {
                if (tok.char === 'ة') { cons = 'ХI'; v = ''; }
                else if (tok.tanween === 'f') { v = (tok.type === 'hard' || tok.type === 'r') ? 'ОО' : 'АА'; }
                else if (tok.tanween) { v = `(${v})`; }
                else if (tok.haraka) { v = `(${v})`; }
            }

            currentWordCy += cons + v;
            if (tok.attachNextConsonant) currentWordCy += tok.attachNextConsonant;
        }

        if (currentWordAr.trim() || currentWordCy.trim()) {
            lineWords.push({ ar: currentWordAr.trim(), cy: currentWordCy.toUpperCase() });
        }

        for (let i = 0; i < lineWords.length; i++) {
            let w = lineWords[i];
            
            w.cy = w.cy.replace(/\s+/g, "");
            w.cy = w.cy.replace(/РОХЬМААН/g, "РОХЬМАН");
            w.cy = w.cy.replace(/Х1/g, "ХI");

            let cleanAr = w.ar.replace(/[^\u0621-\u064A\u0671]/g, ''); 
            let isStandaloneAllah = ['الله', 'ٱلله', 'اللهم', 'ٱللهم'].includes(cleanAr);
            let prefixedAllah = ['لله', 'بالله', 'والله', 'تالله', 'فالله', 'فلله', 'ولله', 'فاللهم', 'واللهم'].includes(cleanAr) ? cleanAr : null;

            if (isStandaloneAllah || prefixedAllah) {
                let index = w.cy.indexOf("ХI");
                let ending = "";
                if (index !== -1) {
                    ending = w.cy.substring(index + 2); 
                } else {
                    let m = w.cy.match(/[АИУ][А-Я\*\Ь]*$/);
                    if (m) ending = m[0];
                }

                if (prefixedAllah) {
                    let baseAllah = "";
                    if (prefixedAllah === 'لله') baseAllah = "ЛИЛЛЬАХI";
                    else if (prefixedAllah === 'فلله') baseAllah = "ФАЛИЛЛЬАХI";
                    else if (prefixedAllah === 'ولله') baseAllah = "ВАЛИЛЛЬАХI";
                    else if (prefixedAllah === 'بالله') baseAllah = "БИЛЛЬАХI";
                    else if (prefixedAllah === 'تالله') baseAllah = "ТАЛЛОХI";
                    else if (prefixedAllah === 'والله') baseAllah = "ВАЛЛОХI";
                    else if (prefixedAllah === 'فالله') baseAllah = "ФАЛЛОХI";
                    else if (prefixedAllah === 'واللهم') baseAllah = "ВАЛЛОХI";
                    else if (prefixedAllah === 'فاللهم') baseAllah = "ФАЛЛОХI";
                    
                    w.cy = baseAllah + ending;
                } else if (isStandaloneAllah) {
                    let prevW = i > 0 ? lineWords[i-1].cy : "";
                    
                    if (i === 0 || !prevW) {
                        w.cy = "АЛЛОХI" + ending; 
                    } else {
                        let lastVowelMatch = prevW.match(/[АИУЫОЭЕЯЮЁ]/g);
                        let prevVowel = lastVowelMatch ? lastVowelMatch[lastVowelMatch.length - 1] : 'А';
                        
                        if (prevW.endsWith("ЛЬ")) {
                            prevW = prevW.slice(0, -2);
                        } else if (prevW.endsWith("Л") || prevW.endsWith("ЛЪ")) {
                            prevW = prevW.replace(/ЛЪ?$/, "");
                        }
                        
                        let baseAllah = (prevVowel === 'И' || prevVowel === 'Ы') ? "ЛЛЬАХI" : "ЛЛОХI";
                        
                        lineWords[i-1].cy = prevW + baseAllah + ending;
                        lineWords[i-1].ar += " " + w.ar; 
                        w.cy = ""; 
                    }
                }
            }
        }
        
        lineWords = lineWords.filter(w => w.cy !== "");

        for (let i = 0; i < lineWords.length - 1; i++) {
            let combined = lineWords[i].cy + " " + lineWords[i+1].cy;
            if (/РОСУУЛ[У\*МН]* ММИНА/.test(combined)) {
                lineWords[i].cy = "РОСУУЛЬУ"; 
            }
            if (/СУХЬУФ[УА\*МН]* ММУТ/.test(combined)) {
                lineWords[i].cy = "СУХЬУФА*Н"; 
            }
            if (/КУТУБ[У\*Н]* КЪОЙ/.test(combined)) {
                lineWords[i].cy = "КУТУБН"; 
            }
        }

        for (let w of lineWords) {
            finalJSONArray.push({
                id: globalIdCount++,
                ayah: ayahCount, 
                ar: w.ar,
                cy: w.cy
            });
        }

        ayahCount++; 
    }

    document.getElementById('cyrillicOutput').value = JSON.stringify(finalJSONArray);
}

// === ИНТЕГРАЦИЯ FIREBASE ===
const firebaseConfig = { databaseURL: "https://messengerb-dcc80-default-rtdb.europe-west1.firebasedatabase.app" };
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();
const TRANSLITERATOR_DB_PATH = 'transliterations_node'; 

let firebaseSavedData = {}; 

database.ref(TRANSLITERATOR_DB_PATH).on('value', (snap) => {
    firebaseSavedData = snap.exists() ? snap.val() : {};
    renderSavedList();
});

function saveCurrentText() {
    const arabic = document.getElementById('arabicInput').value.trim();
    const cyrillicOutputVal = document.getElementById('cyrillicOutput').value.trim();

    if (!arabic || !cyrillicOutputVal) {
        alert("Сначала вставьте арабский текст и сгенерируйте JSON!");
        return;
    }

    let parsedJSON;
    try {
        parsedJSON = JSON.parse(cyrillicOutputVal);
    } catch(e) {
        alert("Ошибка в JSON формате. Убедитесь, что вывод корректен.");
        return;
    }

    let title = prompt("Введите название для сохранения в базу (например: Аль-Фатиха 1-3 аят):");
    if (title === null) return; 
    if (title.trim() === "") title = "Сура от " + new Date().toLocaleDateString();

    const newItem = {
        title: title,
        arabic: arabic,
        items: parsedJSON, 
        timestamp: Date.now()
    };

    database.ref(TRANSLITERATOR_DB_PATH).push(newItem).catch(err => {
        alert("Ошибка сохранения в базу: " + err.message);
    });
}

function loadText(key) {
    const item = firebaseSavedData[key];
    if (item) {
        document.getElementById('arabicInput').value = item.arabic || "";
        
        let dataToLoad = item.items || item.cyrillic || [];
        document.getElementById('cyrillicOutput').value = typeof dataToLoad === 'object' ? JSON.stringify(dataToLoad, null, 2) : dataToLoad;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function deleteText(key) {
    if (confirm("Удалить этот текст из общей базы данных? Он пропадет и из Транскриптора.")) {
        database.ref(TRANSLITERATOR_DB_PATH + '/' + key).remove();
    }
}

function renderSavedList() {
    const container = document.getElementById('savedListContainer');
    container.innerHTML = '';

    const keys = Object.keys(firebaseSavedData);

    if (keys.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: var(--text-muted); margin-top: 10px;">База пуста. Сохраненные тексты появятся здесь и в Транскрипторе.</p>';
        return;
    }

    keys.sort((a, b) => (firebaseSavedData[b].timestamp || 0) - (firebaseSavedData[a].timestamp || 0));

    keys.forEach(key => {
        const item = firebaseSavedData[key];
        const div = document.createElement('div');
        div.className = 'saved-item';
        
        let dataArray = item.items || item.cyrillic;
        let preview = "";
        if (Array.isArray(dataArray)) {
            preview = dataArray.map(x => x.cy || "").join(' ').substring(0, 70) + '...';
        } else {
            preview = "Устаревший формат данных";
        }

        div.innerHTML = `
            <div class="saved-item-info">
                <div class="saved-item-title">${item.title || "Без названия"}</div>
                <div class="saved-item-preview">☁️ [DB] ${preview}</div>
            </div>
            <div class="saved-item-actions">
                <button class="btn-small" onclick="loadText('${key}')">Загрузить</button>
                <button class="btn-small btn-delete" onclick="deleteText('${key}')">Удалить</button>
            </div>
        `;
        container.appendChild(div);
    });
}

function exportJSON() {
    const keys = Object.keys(firebaseSavedData);
    if (keys.length === 0) {
        alert("База пуста, нечего выгружать.");
        return;
    }
    const dataToExport = keys.map(key => firebaseSavedData[key]);
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataToExport, null, 2));
    const a = document.createElement('a');
    a.href = dataStr;
    a.download = "tajweed_firebase_export.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
}

function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
                imported.forEach(item => {
                    database.ref(TRANSLITERATOR_DB_PATH).push(item);
                });
                alert("Данные успешно загружены в облако!");
            } else {
                alert("Неверный формат файла. Нужен массив JSON.");
            }
        } catch (err) {
            alert("Произошла ошибка при чтении файла JSON.");
        }
        event.target.value = ''; 
    };
    reader.readAsText(file);
}
