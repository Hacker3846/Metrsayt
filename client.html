<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIFZ — Заучивание Корана</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #12513f; /* Глубокий исламский зеленый */
            --primary-light: #1b6b54; 
            --accent: #c5a880; /* Благородное матовое золото */
            --bg: #0b110e; /* Очень темный малахитовый оттенок фона */
            --card: #141f1a; /* Теплый темный фон для блоков */
            --text-muted: #8fa099;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: var(--bg); 
            color: #f0f4f2; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* Гарантирует появление скролла для чтения хадисов в любой ситуации */
        .container { 
            width: 100%; 
            max-width: 600px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            min-height: 100vh; 
            padding-bottom: 50px;
            box-sizing: border-box;
        }
        
        /* Основная карточка управления */
        .player-card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); 
            text-align: center;
            border: 1px solid rgba(197, 168, 128, 0.15);
        }
        
        .track-title { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: var(--accent); letter-spacing: 0.5px; }

        /* НАШ ЖИВОЙ ЛИПКИЙ БЛОК: теперь липнет на уровне браузера идеально к top: 0 */
        .live-sticky-container {
            position: sticky;
            top: 0;
            z-index: 1005;
            background: var(--bg); /* Изначально сливается с фоном сайта */
            padding: 10px 0;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        /* Внутренний контейнер для красивых отступов плеера */
        .live-sticky-inner {
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(197, 168, 128, 0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        /* Бежево-золотой плеер */
        .live-sticky-container audio { 
            width: 100%; 
            background: #1a2922; 
            border-radius: 12px; 
            display: block;
            filter: invert(1) hue-rotate(140deg) sepia(0.6) saturate(1.2) contrast(0.85);
        }

        /* Сетка кнопок перемотки */
        .rewind-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin: 12px 0 0 0; }
        .rewind-grid button { 
            background: #1a2922; 
            border: 1px solid #283e34; 
            color: #f0f4f2; 
            padding: 10px; 
            font-size: 13px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.15s;
        }
        .rewind-grid button:active { background: var(--primary); border-color: var(--accent); color: var(--accent); }

        /* Стиль прилипания: меняем рамку и усиливаем тень, когда блок зафиксирован вверху */
        .live-sticky-container.sticky-active .live-sticky-inner {
            background: #141f1a;
            border-color: rgba(197, 168, 128, 0.4);
            border-radius: 0 0 16px 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.8);
        }

        /* Поисковик и Сортировка */
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
        .search-input { 
            flex: 1; 
            background: #1a2922; 
            color: #fff; 
            border: 1px solid #283e34; 
            padding: 10px 14px; 
            border-radius: 10px; 
            font-size: 14px; 
            outline: none; 
            transition: 0.2s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 5px rgba(197, 168, 128, 0.3); }
        .btn-sort { 
            background: var(--primary); 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 10px 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: bold; 
            white-space: nowrap; 
            min-width: 85px; 
        }
        select { 
            width: 100%; 
            background: #1a2922; 
            color: #fff; 
            border: 1px solid #283e34; 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 15px; 
            outline: none; 
            margin-bottom: 10px; 
        }

        /* Скорость */
        .speed-control { background: #1a2922; padding: 10px 14px; border-radius: 10px; margin: 12px 0; display: flex; align-items: center; justify-content: space-between; }
        .speed-control label { font-size: 13px; color: var(--text-muted); }
        .speed-control input[type="range"] { flex-grow: 1; margin: 0 12px; accent-color: var(--accent); }
        #speedVal { font-weight: bold; min-width: 35px; color: var(--accent); text-align: right; font-size: 13px; }

        /* Настройки Петли (Loop) */
        .loop-settings { display: flex; justify-content: space-between; margin-top: 12px; gap: 10px; }
        .time-group { background: #1a2922; padding: 12px; border-radius: 12px; width: 50%; box-sizing: border-box; border: 1px solid #283e34; }
        .time-group h4 { margin: 0 0 8px 0; color: var(--accent); font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; }
        .inputs-container { display: flex; justify-content: space-between; gap: 5px; }
        .input-sub { width: 50%; }
        .input-sub span { display: block; font-size: 9px; color: var(--text-muted); margin-top: 2px; }
        input[type="number"] { background: #141f1a; color: #fff; border: 1px solid #283e34; padding: 6px; border-radius: 6px; width: 100%; text-align: center; box-sizing: border-box; font-size: 13px; }
        input[type="number"]:focus { border-color: var(--accent); outline: none; }
        .btn-capture { background: #967342; font-size: 11px; padding: 8px; width: 100%; margin-top: 8px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.15s; }
        .btn-capture:active { background: var(--accent); }
        .btn-main { background: var(--primary); width: 100%; font-size: 15px; margin-top: 15px; padding: 14px; border: 1px solid var(--accent); border-radius: 12px; color: var(--accent); font-weight: bold; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }

        /* Вкладки (Tabs) */
        .tabs-header { display: flex; background: #1a2922; border-radius: 12px; padding: 4px; margin: 10px 0; border: 1px solid #283e34; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 12px; font-weight: bold; font-size: 13px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: var(--accent); border: 1px solid rgba(197, 168, 128, 0.4); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .tab-content { display: none; background: var(--card); padding: 22px; border-radius: 20px; min-height: 200px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); box-sizing: border-box; overflow: hidden; border: 1px solid rgba(197, 168, 128, 0.1); }
        .tab-content.active { display: block; }
        #tab0 { padding: 20px 0; } 

        /* Арабский (Мусхаф в картинках) */
        .images-scroll { display: flex; flex-direction: column; gap: 0px; width: 100%; align-items: center; margin: 0; padding: 0; }
        .mushaf-img { width: 100%; max-width: 100%; height: auto; display: block; margin: 0; padding: 0; border: none; }

        /* Караоке транскрипция */
        .karaoke-box { text-align: left; direction: ltr; font-size: 24px; line-height: 1.9; word-break: break-word; font-family: Georgia, serif; }
        .char-span { padding: 2px 4px; cursor: pointer; border-radius: 6px; color: #758c81; transition: background 0.12s, color 0.12s; display: inline-block; margin-bottom: 4px; }
        .char-span.highlight { color: #141f1a; background: var(--accent); font-weight: bold; box-shadow: 0 0 12px var(--accent); }

        /* Русский перевод */
        .translation-box { text-align: left; font-size: 16px; line-height: 1.6; color: #d0dad5; white-space: pre-line; }

        /* Блок Хадисов в самом низу */
        .hadith-card { 
            background: linear-gradient(135deg, #10211a, var(--card)); 
            padding: 18px; 
            border-radius: 16px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.5); 
            text-align: left; 
            border-left: 4px solid var(--accent); 
            border-top: 1px solid rgba(197, 168, 128, 0.1);
            margin-top: 5px;
        }
        .hadith-title { font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
        .hadith-text { font-size: 14px; line-height: 1.5; color: #cbd6d0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">

    <div class="player-card">
        <div class="controls-row">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск суры по названию или №..." oninput="filterSurahs()">
            <button class="btn-sort" id="btnSort" onclick="toggleSort()">1 ➡️ 114</button>
        </div>
        
        <select id="surahSelect" onchange="selectSurah(this.value)">
            <option value="">Загрузка списка сур...</option>
        </select>
        
        <hr style="border-color:#283e34; margin:12px 0;">
        
        <div class="track-title" id="currentTitle">Сура не выбрана</div>
    </div>

    <div class="live-sticky-container" id="liveStickyContainer">
        <div class="live-sticky-inner">
            <audio id="mainPlayer" controls></audio>

            <div class="rewind-grid">
                <button onclick="skip(-10)">-10с</button>
                <button onclick="skip(-5)">-5с</button>
                <button onclick="skip(5)">+5с</button>
                <button onclick="skip(10)">+10с</button>
            </div>
        </div>
    </div>
    <div class="player-card" style="margin-top: -5px;">
        <div class="speed-control" style="margin-top: 0;">
            <label>Скорость чтения:</label>
            <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="changeSpeed(this.value)">
            <span id="speedVal">1.0x</span>
        </div>

        <div class="loop-settings">
            <div class="time-group">
                <h4>НАЧАЛО ПЕТЛИ</h4>
                <div class="inputs-container">
                    <div class="input-sub">
                        <input type="number" id="startMin" value="0" min="0">
                        <span>мин</span>
                    </div>
                    <div class="input-sub">
                        <input type="number" id="startSec" value="0" min="0" max="59" step="0.1">
                        <span>сек</span>
                    </div>
                </div>
                <button class="btn-capture" id="btnCapStart" onclick="captureTime('start')">⏱ Поймать</button>
            </div>
            
            <div class="time-group">
                <h4>КОНЕЦ ПЕТЛИ</h4>
                <div class="inputs-container">
                    <div class="input-sub">
                        <input type="number" id="endMin" value="0" min="0">
                        <span>мин</span>
                    </div>
                    <div class="input-sub">
                        <input type="number" id="endSec" value="10" min="0" max="59" step="0.1">
                        <span>сек</span>
                    </div>
                </div>
                <button class="btn-capture" id="btnCapEnd" onclick="captureTime('end')">⏱ Поймать</button>
            </div>
        </div>

        <button class="btn-main" id="btnLoop" onclick="toggleLoop()">ВКЛЮЧИТЬ ПОВТОР: ВЫКЛ</button>
    </div>

    <div class="tabs-header">
        <button class="tab-btn active" onclick="switchTab(0)">1: Арабский</button>
        <button class="tab-btn" onclick="switchTab(1)">2: Караоке</button>
        <button class="tab-btn" onclick="switchTab(2)">3: Перевод</button>
    </div>

    <div id="tab0" class="tab-content active">
        <div class="images-scroll" id="mushafContainer">
            <p style="color:var(--text-muted); font-size:14px; text-align:center; padding: 0 20px;">Здесь будут отображаться страницы Мусхафа для выбранной суры.</p>
        </div>
    </div>

    <div id="tab1" class="tab-content">
        <div class="karaoke-box" id="karaokeContainer">
            <p style="color:var(--text-muted); font-size:14px; text-align:center;">Текст транскрипции с удобной подсветкой слева направо.</p>
        </div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="translation-box" id="translationContainer">
            <p style="color:var(--text-muted); font-size:14px;">Полный текст русского перевода выбранной суры.</p>
        </div>
    </div>

    <div class="hadith-card" id="hadithCard" style="display:none;">
        <div class="hadith-title">Мудрость / Хадис дня</div>
        <div class="hadith-text" id="hadithContent">Загрузка благословения...</div>
    </div>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://messengerb-dcc80-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allSurahs = [];       
    let isReversed = false;   
    let currentMarkup = null; 
    let searchQuery = "";     
    let isLooping = false;
    let initialProgressApplied = false;
    
    // Переменная для отслеживания текущей активной вкладки (0 - Арабский, 1 - Караоке, 2 - Перевод)
    let currentActiveTab = 0;
    
    let clientSpansCache = [];

    const mainPlayer = document.getElementById('mainPlayer');
    const liveStickyContainer = document.getElementById('liveStickyContainer');
    const startMin = document.getElementById('startMin'), startSec = document.getElementById('startSec');
    const endMin = document.getElementById('endMin'), endSec = document.getElementById('endSec');
    const btnLoop = document.getElementById('btnLoop');

    // Отслеживаем прокрутку исключительно для включения стилей тени/рамок липкого плеера
    window.addEventListener('scroll', () => {
        if (liveStickyContainer.getBoundingClientRect().top <= 1) {
            liveStickyContainer.classList.add('sticky-active');
        } else {
            liveStickyContainer.classList.remove('sticky-active');
        }
    });

    function formatSurahName(rawName) {
        let clean = rawName.trim();
        let part = "";
        
        let partMatch = clean.match(/^\((\d+)\)/);
        if (partMatch) {
            part = ` (${partMatch[1]})`;
            clean = clean.replace(/^\(\d+\)/, "").trim();
        }
        
        let nameMatch = clean.match(/^([^-]+)-(\d+)$/) || clean.match(/^(\d+)-([^-]+)$/);
        if (nameMatch) {
            if (isNaN(nameMatch[1])) {
                return `${nameMatch[2]}-${nameMatch[1]}${part}`;
            } else {
                return `${nameMatch[1]}-${nameMatch[2]}${part}`;
            }
        }
        return rawName + part;
    }

    function getSurahNumber(displayName) {
        let match = displayName.match(/^(\d+)/);
        return match ? parseInt(match[1]) : null;
    }

    // Загрузка хадисов
    database.ref('hadiths').get().then((snap) => {
        if(snap.exists()) {
            const data = snap.val();
            const keys = Object.keys(data);
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            document.getElementById('hadithContent').textContent = data[randomKey].text;
            document.getElementById('hadithCard').style.display = "block";
        }
    }).catch(err => console.error("Ошибка загрузки хадисов:", err));

    // Стриминг сур
    database.ref('surahs').on('value', (snap) => {
        if(!snap.exists()) return;
        allSurahs = [];
        snap.forEach((child) => {
            let originalName = child.val().name;
            let structuredName = formatSurahName(originalName);
            allSurahs.push({ id: child.key, name: structuredName, audio: child.val().audio });
        });
        
        allSurahs.sort((a, b) => {
            let numA = getSurahNumber(a.name) || 999;
            let numB = getSurahNumber(b.name) || 999;
            if(numA !== numB) return numA - numB;
            return a.name.localeCompare(b.name);
        });

        renderSelect();
        
        if (!initialProgressApplied) {
            const lastSurahId = localStorage.getItem('hifz_last_surah');
            const lastTime = localStorage.getItem('hifz_last_time');
            if (lastSurahId && allSurahs.some(s => s.id === lastSurahId)) {
                document.getElementById('surahSelect').value = lastSurahId;
                loadSurahData(lastSurahId, parseFloat(lastTime) || 0);
            }
            initialProgressApplied = true;
        }
    });

    function renderSelect() {
        const select = document.getElementById('surahSelect');
        const currentVal = select.value;
        select.innerHTML = '<option value="">-- Нажмите для выбора --</option>';
        
        let filtered = [...allSurahs];
        if(searchQuery.trim() !== "") {
            const q = searchQuery.toLowerCase().trim();
            filtered = filtered.filter(surah => surah.name.toLowerCase().includes(q));
        }
        if(isReversed) { filtered.reverse(); }

        filtered.forEach(surah => {
            const opt = document.createElement('option');
            opt.value = surah.id;
            opt.textContent = surah.name;
            select.appendChild(opt);
        });
        if (currentVal) select.value = currentVal;
    }

    function filterSurahs() {
        searchQuery = document.getElementById('searchInput').value;
        renderSelect();
    }

    function toggleSort() {
        isReversed = !isReversed;
        document.getElementById('btnSort').textContent = isReversed ? "114 ➡️ 1" : "1 ➡️ 114";
        renderSelect();
    }

    function selectSurah(id) {
        if(!id) return;
        loadSurahData(id, 0, true);
    }

    function loadSurahData(id, startTime = 0, autoplay = false) {
        const track = allSurahs.find(s => s.id === id);
        if(!track) return;

        document.getElementById('currentTitle').textContent = track.name;
        
        isLooping = false;
        btnLoop.textContent = "ВКЛЮЧИТЬ ПОВТОР: ВЫКЛ";
        btnLoop.style.background = "#12513f"; 
        btnLoop.style.borderColor = "#c5a880";

        mainPlayer.src = track.audio;
        mainPlayer.currentTime = startTime;
        
        mainPlayer.onloadedmetadata = () => {
            if (startTime === 0) {
                setInputs(mainPlayer.duration, endMin, endSec);
            }
            if (autoplay) mainPlayer.play();
        };

        localStorage.setItem('hifz_last_surah', id);
        const surahNum = getSurahNumber(track.name);

        loadMushafImages(surahNum);
        loadKaraokeMarkup(id);
        loadRussianTranslation(surahNum);
    }

    function loadMushafImages(surahNum) {
        const container = document.getElementById('mushafContainer');
        container.innerHTML = "<p style='color:var(--text-muted); text-align:center;'>Поиск страниц Мусхафа...</p>";
        if(!surahNum) { container.innerHTML = "<p style='color:var(--text-muted); text-align:center;'>Не удалось определить номер суры.</p>"; return; }

        let padded = String(surahNum).padStart(3, '0');
        
        database.ref('surah_images').orderByKey().startAt(padded + '_').endAt(padded + '_\uffff').get().then(snap => {
            container.innerHTML = "";
            if(!snap.exists()) { container.innerHTML = "<p style='color:var(--text-muted); text-align:center; padding: 0 20px;'>Для этой суры арабские страницы не загружены.</p>"; return; }
            
            snap.forEach(child => {
                const img = document.createElement('img');
                img.className = "mushaf-img";
                img.src = child.val().image;
                container.appendChild(img);
            });
        });
    }

    function loadKaraokeMarkup(trackId) {
        const container = document.getElementById('karaokeContainer');
        container.innerHTML = "Загрузка текста подсветки...";
        currentMarkup = null;
        clientSpansCache = []; 

        database.ref('surahs/' + trackId + '/markup').get().then(snap => {
            container.innerHTML = "";
            if(!snap.exists() || !snap.val().text) { 
                container.innerHTML = "<p style='text-align:center; font-size:14px; color:var(--text-muted);'>Разметка караоке еще не создана.</p>"; 
                return; 
            }

            currentMarkup = snap.val();
            
            let tokens = [];
            let isWordMode = currentMarkup.text.includes(' ');
            
            if (isWordMode) {
                tokens = currentMarkup.text.split(/\s+/);
            } else {
                tokens = currentMarkup.text.split('');
            }
            
            tokens.forEach((token, idx) => {
                const span = document.createElement('span');
                span.className = 'char-span';
                span.textContent = isWordMode ? token + ' ' : token;
                span.setAttribute('data-idx', idx);

                span.onclick = () => {
                    if(currentMarkup && currentMarkup.timings && currentMarkup.timings[idx] !== null && currentMarkup.timings[idx] !== undefined) {
                        mainPlayer.currentTime = currentMarkup.timings[idx];
                    }
                };
                container.appendChild(span);
                clientSpansCache.push(span); 
            });
        });
    }

    function loadRussianTranslation(surahNum) {
        const container = document.getElementById('translationContainer');
        container.innerHTML = "Загрузка русского перевода...";
        if(!surahNum) { container.innerHTML = "Не удалось определить номер суры."; return; }

        let padded = String(surahNum).padStart(3, '0');
        database.ref('surah_translations/' + padded).get().then(snap => {
            if(snap.exists()) {
                container.innerHTML = snap.val().text;
            } else {
                container.innerHTML = "Русский перевод еще не добавлен.";
            }
        });
    }

    function skip(s) { 
        mainPlayer.currentTime = Math.min(mainPlayer.duration || 0, Math.max(0, mainPlayer.currentTime + s)); 
    }

    function changeSpeed(val) {
        const speed = parseFloat(val).toFixed(1);
        mainPlayer.playbackRate = speed;
        document.getElementById('speedVal').textContent = speed + 'x';
    }

    function setInputs(total, minIn, secIn) {
        minIn.value = Math.floor(total / 60);
        secIn.value = (total % 60).toFixed(1);
    }

    function captureTime(type) {
        if (type === 'start') {
            setInputs(mainPlayer.currentTime, startMin, startSec);
        } else {
            setInputs(mainPlayer.currentTime, endMin, endSec);
        }
    }

    function toggleLoop() {
        isLooping = !isLooping;
        btnLoop.textContent = isLooping ? "ВКЛЮЧИТЬ ПОВТОР: ВКЛ" : "ВКЛЮЧИТЬ ПОВТОР: ВЫКЛ";
        btnLoop.style.background = isLooping ? "#1e5e3a" : "#12513f";
        btnLoop.style.borderColor = isLooping ? "#66bb6a" : "#c5a880";
        if (isLooping) {
            let start = (parseInt(startMin.value)||0)*60 + (parseFloat(startSec.value)||0);
            if (mainPlayer.currentTime < start) mainPlayer.currentTime = start;
            mainPlayer.play();
        }
    }

    mainPlayer.addEventListener('timeupdate', () => {
        const currentTime = mainPlayer.currentTime;

        if (mainPlayer.src && currentTime > 0) {
            localStorage.setItem('hifz_last_time', currentTime);
        }

        if (isLooping) {
            let start = (parseInt(startMin.value)||0)*60 + (parseFloat(startSec.value)||0);
            let end = (parseInt(endMin.value)||0)*60 + (parseFloat(endSec.value)||0);
            if (currentTime >= end || currentTime < start) {
                mainPlayer.currentTime = start;
                mainPlayer.play();
            }
        }

        if (!currentMarkup || !currentMarkup.timings || clientSpansCache.length === 0) return;
        const timings = currentMarkup.timings;
        
        for (let i = 0; i < timings.length; i++) {
            const span = clientSpansCache[i];
            if (!span) continue;

            const startTime = timings[i];
            const endTime = (i + 1 < timings.length && timings[i+1] !== null && timings[i+1] !== undefined) ? timings[i+1] : mainPlayer.duration;

            if (startTime !== null && startTime !== undefined && currentTime >= startTime && currentTime < endTime) {
                if (!span.classList.contains('highlight')) {
                    span.classList.add('highlight');
                    
                    // УСЛОВИЕ ИСПРАВЛЕНИЯ: автоскролл работает ТОЛЬКО если открыта вкладка Караоке (индекс 1)
                    if (currentActiveTab === 1) {
                        const offset = 140;
                        const bodyRect = document.body.getBoundingClientRect().top;
                        const elementRect = span.getBoundingClientRect().top;
                        const elementPosition = elementRect - bodyRect;
                        const offsetPosition = elementPosition - offset - (window.innerHeight / 4);

                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                }
            } else {
                span.classList.remove('highlight');
            }
        }
    });

    function switchTab(tabIndex) {
        currentActiveTab = tabIndex; // Запоминаем текущую открытую вкладку
        
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === tabIndex);
        });
        document.querySelectorAll('.tab-content').forEach((content, idx) => {
            content.classList.toggle('active', idx === tabIndex);
        });
    }
</script>
</body>
</html>
